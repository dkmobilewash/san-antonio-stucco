[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  PUPPETEER_SKIP_CHROMIUM_DOWNLOAD = "false"

[[redirects]]
  from = "https://www.sanantoniostucco.com/*"
  to = "https://sanantoniostucco.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
